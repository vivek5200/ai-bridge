<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      padding: 20px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: #6c7086;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #a6adc8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      color: #cdd6f4;
      font-size: 14px;
      font-family: 'Fira Code', 'Consolas', monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: #89b4fa;
    }

    .field input[type="number"] {
      width: 100px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #181825;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected { background: #a6e3a1; }
    .status-dot.disconnected { background: #f38ba8; }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-save {
      background: #89b4fa;
      color: #1e1e2e;
    }

    .btn-save:hover {
      background: #b4d0fb;
    }

    .saved-msg {
      text-align: center;
      font-size: 13px;
      color: #a6e3a1;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .saved-msg.show { opacity: 1; }

    hr {
      border: none;
      border-top: 1px solid #313244;
      margin: 16px 0;
    }

    .help {
      font-size: 11px;
      color: #6c7086;
      line-height: 1.6;
    }

    .help code {
      background: #313244;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>⚡ AI Bridge</h1>
  <p class="subtitle">Browser to VS Code</p>

  <div class="status" id="statusBar">
    <span class="status-dot disconnected" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <div class="field">
    <label>Auth Token</label>
    <input type="text" id="tokenInput" placeholder="Paste token from hub terminal" />
  </div>

  <div class="field">
    <label>Hub Host</label>
    <input type="text" id="hostInput" value="127.0.0.1" />
  </div>

  <div class="field">
    <label>Hub Port</label>
    <input type="number" id="portInput" value="8080" />
  </div>

  <button class="btn btn-save" id="saveBtn">Save & Connect</button>
  <div class="saved-msg" id="savedMsg">✓ Settings saved</div>

  <hr>

  <div class="help">
    <p>1. Start the hub: <code>node server.js</code></p>
    <p>2. Copy the printed token above</p>
    <p>3. Install the VS Code extension</p>
    <p>4. Open an AI chat and start coding!</p>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
